spring.application.name=monstermapa

server.port=8080

# para mysql 8 bbdd productos_ite
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3305/monster_map
spring.datasource.username=yourUsername
spring.datasource.password=yourPassword


#spring.jpa.hibernate.ddl-auto=update
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true
#spring.jpa.generate-ddl=false
#spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
#spring.jpa.show-sql=true


spring.mvc.cors.allowed-origins=http://localhost:4200,http://localhost:8100,https://monsterfinder.vmateogm.com
spring.mvc.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.mvc.cors.allowed-headers=Authorization,Content-Type,X-Requested-With
spring.mvc.cors.allow-credentials=true
spring.mvc.cors.max-age=3600

spring.jackson.serialization.FAIL_ON_EMPTY_BEANS=false
spring.jackson.default-property-inclusion=NON_NULL


spring.main.allow-circular-references=true


server.servlet.session.timeout=1440m
server.servlet.session.cookie.max-age=1440m
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=false


app.jwt.token-validity=1440
app.jwt.store-in-db=true


server.servlet.context-path=


logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG
